name: Build Fabric Mod

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: |
          unzip ZepkarHUDTweaker-v2-fixed-source.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build mod
        run: |
          cd ZepkarHUDTweaker-v2-fixed
          chmod +x gradlew
          ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: mod
          path: ZepkarHUDTweaker-v2-fixed/build/libs/*.jar
